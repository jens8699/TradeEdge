<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>TradeEdge — Hi-Fi v1</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#1A1410; min-height:100vh; font-family:'Inter', sans-serif; color:#F0E6D8; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="tradeedge-hifi.jsx"></script>

<script type="text/babel">
function App() {
  const [tweaks, setTweak] = useTweaks(/*EDITMODE-BEGIN*/{
    "mode": "light"
  }/*EDITMODE-END*/);
  const mode = tweaks.mode;
  const P = PAL[mode];

  return (
    <>
      <DesignCanvas title="TradeEdge — Hi-Fi v1" subtitle={`Editorial sidebar + selective cards · ${mode} mode`}>
        <DCSection id="overview" title="Overview">
          <DCArtboard id="cover" label="Read me first" width={900} height={540}>
            <Cover mode={mode} P={P}/>
          </DCArtboard>
        </DCSection>

        <DCSection id="dashboard" title="Dashboard">
          <DCArtboard id="dashboard" label={`Today (${mode})`} width={1280} height={1180}>
            <Frame active="dashboard" mode={mode}><Dashboard/></Frame>
          </DCArtboard>
        </DCSection>

        <DCSection id="log" title="Log a trade">
          <DCArtboard id="log" label={`Log (${mode})`} width={1280} height={1320}>
            <Frame active="log" mode={mode}><Log/></Frame>
          </DCArtboard>
        </DCSection>

        <DCSection id="calendar" title="Calendar">
          <DCArtboard id="calendar" label={`Calendar (${mode})`} width={1280} height={780}>
            <Frame active="calendar" mode={mode}><CalendarView/></Frame>
          </DCArtboard>
        </DCSection>

        <DCSection id="stats" title="Stats">
          <DCArtboard id="stats" label={`Stats (${mode})`} width={1280} height={1280}>
            <Frame active="stats" mode={mode}><Stats/></Frame>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Theme">
          <TweakRadio
            value={tweaks.mode}
            onChange={v => setTweak('mode', v)}
            options={[{value:'dark', label:'Dark'},{value:'light', label:'Light'}]}
          />
        </TweakSection>
        <TweakSection title="Design system">
          <div style={{fontSize:12, color:'#A89687', lineHeight:1.55, fontFamily:'Inter, sans-serif'}}>
            <div><b style={{color:'#F0E6D8'}}>Type:</b> Fraunces serif (display + italic accents) · Inter sans · JetBrains Mono (numbers)</div>
            <div style={{marginTop:6}}><b style={{color:'#F0E6D8'}}>Color:</b> warm brown bg, amber accent, terracotta for losses</div>
            <div style={{marginTop:6}}><b style={{color:'#F0E6D8'}}>Layout:</b> persistent sidebar nav, generous padding (44px gutters), 1px hairline rules instead of heavy boxes</div>
          </div>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
